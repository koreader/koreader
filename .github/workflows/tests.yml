name: CI tests

defaults:
  run:
    shell: bash

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-20.04]

    container: 
        image: koreader/koappimage:0.2.2
        options: --user ko
        
    env:
        EMULATE_READER: 1
        # this is for shellcheck 0.4.5 and lower; can be removed for 0.4.6
        LC_ALL: en_US.UTF8
        HOME: /home/ko
        CIRCLE_WORKING_DIRECTORY: ${{ github.workspace }}

    steps:
      - name: permissions
        run: sudo chown -R ko:ko /__w/koreader/

      - name: git update
        run: sudo add-apt-repository ppa:git-core/ppa -y && sudo apt-get update && sudo apt-get install git -y

      - name: Check out Git repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Cache deps
        uses: actions/cache@v2
        with:
            path: |
                /home/ko/.ccache
                base
            key: deps-${{ runner.os }}-${{ hashFiles('.ci/install.sh') }}-${{ hashFiles('.ci/helper_luarocks.sh') }}

      - name: need to init some stuff first or git will complain when sticking in base cache
        run: git submodule init base && git submodule update base && pushd base && git submodule init && git submodule update && popd

      - name: cache check
        run: pushd base && git_rev_base=$(git describe HEAD) && popd && echo $git_rev_base && echo $git_rev_base >git-rev-base

      - name: Cache base
        uses: actions/cache@v2
        with:
            path: |
                /home/ko/bin
                /home/ko/.luarocks
                install
            key: build-${{ runner.os }}-${{ hashFiles('git-rev-base') }}

      - name: setup env
        run: echo "${HOME}/bin" | sudo tee -a $GITHUB_PATH

      - name: install
        run: .ci/install.sh

      - name: fetch
        run: .ci/fetch.sh

      - name: check
        run: .ci/check.sh

      - name:  build
        run: .ci/build.sh

      - name:  test
        run: .ci/test.sh

      - name:  docs-and-coverage
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: .ci/after_success.sh


