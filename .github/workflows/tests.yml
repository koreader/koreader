name: CI tests

defaults:
  run:
    shell: bash

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
        EMULATE_READER: 1
        # pretend to be cirleci so the scripts dont have to change
        CIRCLE_WORKING_DIRECTORY: ${{ github.workspace }}
        GITHUB_PAT: ${{ secrets.GITHUB_PAT }}

    steps:
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y luarocks gettext ccache libsdl2-2.0-0

      - name: Shfmt
        run:  sudo curl -sSL "https://github.com/mvdan/sh/releases/download/v3.4.0/shfmt_v3.4.0_linux_amd64" -o "/usr/local/bin/shfmt" && sudo chmod +x "/usr/local/bin/shfmt"

      - name: Luarocks
        run: sudo luarocks install luacheck && sudo luarocks install busted

      - name: Check out Git repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

        # need to init some stuff first or git will complain when sticking in base cache
      - name: Init base submodule
        run: git submodule init base && git submodule update base && pushd base && git submodule init && git submodule update && popd

      - name: base cache check
        run: pushd base && git_rev_base=$(git describe HEAD) && popd && echo $git_rev_base && echo $git_rev_base >git-rev-base

      - name: Cache base
        uses: actions/cache@v2
        with:
            path: |
                .ccache
                base
            key: build-${{ hashFiles('git-rev-base') }}

      - name: Check 2
        run: .ci/check.sh

      - name: Check
        run: ./kodev check

      - name: Build
        run: ./kodev build

      - name: Test
        run: ./kodev test front

